<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlphaFold Protein Quiz</title>
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    h1 { font-size: 1.8rem; margin: 0.5rem 0 0.25rem; }
    .subtitle { color: #777; font-size: 0.85rem; margin-bottom: 1rem; }
    #viewer-container {
      width: 100%;
      max-width: 560px;
      height: 400px;
      background: #1a1d2e;
      border-radius: 12px;
      margin-bottom: 1rem;
      position: relative;
    }
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,17,23,0.85);
      border-radius: 12px;
      z-index: 10;
      font-size: 1rem;
      color: #aaa;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #333;
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #info-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #888;
    }
    #info-bar span { background: #1e2030; padding: 4px 10px; border-radius: 6px; }

    #question {
      font-size: 1.15rem;
      margin-bottom: 0.75rem;
      min-height: 2rem;
    }
    #options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1rem;
    }
    .opt-btn {
      padding: 14px 16px;
      border: 2px solid #2a2d3e;
      border-radius: 10px;
      background: #1a1d2e;
      color: #ddd;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      text-align: left;
    }
    .opt-btn:hover:not(:disabled) {
      border-color: #3498db;
      background: #222540;
      transform: translateY(-1px);
    }
    .opt-btn.correct {
      border-color: #27ae60;
      background: #1a3d2a;
      color: #2ecc71;
    }
    .opt-btn.wrong {
      border-color: #c0392b;
      background: #3d1a1a;
      color: #e74c3c;
    }
    .opt-btn.disabled { cursor: default; }

    #result {
      font-size: 1.1rem;
      min-height: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .win { color: #2ecc71; }
    .lose { color: #e74c3c; }

    #explanation {
      font-size: 0.9rem;
      color: #999;
      max-width: 560px;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    #score {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 1rem;
    }

    .btn-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .action-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      color: #fff;
    }
    .action-btn.primary { background: #3498db; }
    .action-btn.primary:hover { background: #2980b9; }
    .action-btn.secondary { background: #555; }
    .action-btn.secondary:hover { background: #666; }

    a { color: #3498db; text-decoration: none; }
    a:hover { text-decoration: underline; }
    #credits { font-size: 0.75rem; color: #555; margin-top: 2rem; }

    @media (max-width: 600px) {
      #options { grid-template-columns: 1fr; }
      #viewer-container { height: 300px; }
    }
  </style>
</head>
<body>
  <h1>🧬 AlphaFold Quiz</h1>
  <p class="subtitle">Which protein is this? Guess from the 3D structure.</p>

  <div id="viewer-container">
    <div id="loading-overlay"><div class="spinner"></div>Loading structure…</div>
    <div id="mol-viewer" style="width:100%;height:100%"></div>
  </div>

  <div id="info-bar">
    <span id="uniprot-id"></span>
    <span id="residue-count"></span>
  </div>

  <div id="question">Which protein is shown above?</div>
  <div id="options"></div>
  <div id="result"></div>
  <div id="explanation"></div>
  <div id="score"></div>
  <div class="btn-row">
    <button class="action-btn primary" id="next-btn" onclick="nextRound()" style="display:none">Next Protein →</button>
    <button class="action-btn secondary" id="new-btn" onclick="resetGame()" style="display:none">New Game</button>
  </div>
  <p id="credits">Structures from <a href="https://alphafold.ebi.ac.uk" target="_blank">AlphaFold DB</a> · Powered by <a href="https://3dmol.org" target="_blank">3Dmol.js</a></p>

  <script src="proteins.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
